<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日训练 — Papier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2c2418;
    --parchment: #f5f0e8;
    --paper: #faf7f2;
    --amber: #c4873b;
    --amber-deep: #a06a28;
    --amber-light: #fef3c7;
    --border: #e8e2d7;
    --muted: #9c9488;
    --topbar-h: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Topbar ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--topbar-h);
    background: var(--ink);
    display: flex; align-items: center;
    padding: 0 32px;
    z-index: 100;
    border-bottom: 2px solid var(--amber);
  }
  .logo {
    font-family: 'Playfair Display', 'Noto Serif SC', serif;
    font-size: 1.6rem; font-weight: 700;
    color: var(--parchment);
    letter-spacing: 0.04em;
    margin-right: 48px;
    text-decoration: none;
  }
  .logo em { color: var(--amber); font-style: italic; }
  .top-nav { display: flex; list-style: none; gap: 2px; }
  .top-nav a {
    display: block; padding: 8px 18px; border-radius: 6px;
    color: #b8ae9e; text-decoration: none; font-size: 0.85rem; font-weight: 500;
    transition: all 0.2s;
  }
  .top-nav a:hover, .top-nav a.active { color: var(--parchment); background: rgba(196,135,59,0.15); }

  /* ── Main ── */
  .main {
    max-width: 780px;
    margin: 0 auto;
    padding: calc(var(--topbar-h) + 48px) 24px 100px;
  }
  .page-title {
    font-family: 'Noto Serif SC', 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 900;
    margin-bottom: 8px; color: var(--ink);
  }
  .page-subtitle { font-size: 0.9rem; color: var(--muted); margin-bottom: 36px; }

  /* ── Input Area ── */
  .input-card {
    background: #fff; border-radius: 16px; padding: 28px 32px;
    box-shadow: 0 1px 0 var(--border), 0 4px 24px rgba(0,0,0,0.04);
    margin-bottom: 40px;
    border: 1px solid var(--border);
  }
  .input-row { display: flex; gap: 12px; }
  .input-field {
    flex: 1; padding: 14px 18px; border: 1px solid var(--border);
    border-radius: 12px; font-size: 0.92rem; font-family: inherit;
    background: var(--paper); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-field:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(196,135,59,0.1); }
  .input-actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn {
    padding: 10px 22px; border-radius: 10px; font-size: 0.88rem; font-weight: 600;
    border: none; cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--amber), var(--amber-deep));
    color: #fff; box-shadow: 0 2px 8px rgba(180,83,9,0.2);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(180,83,9,0.3); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: none; color: var(--muted); border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: #fff; color: var(--ink); }

  .preset-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .chip {
    padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 500;
    border: 1px solid var(--border); background: #fff; color: var(--muted);
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .chip:hover { border-color: var(--amber); color: var(--amber-deep); background: var(--amber-light); }
  .chip.active { background: var(--amber); color: #fff; border-color: var(--amber); }

  /* ── Loading ── */
  .loading-dots {
    display: none; align-items: center; gap: 6px; padding: 12px 0; margin-bottom: 32px;
  }
  .loading-dots.visible { display: flex; }
  .loading-dots span {
    width: 8px; height: 8px; border-radius: 50%; background: var(--amber);
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }

  /* ── Question Cards ── */
  .questions-list { display: flex; flex-direction: column; gap: 10px; }
  .q-card {
    background: #fff; border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; transition: all 0.3s ease;
    box-shadow: 0 1px 0 var(--border);
  }
  .q-card.expanded { border-color: var(--amber); box-shadow: 0 2px 16px rgba(196,135,59,0.1); }
  .q-header {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 24px; cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .q-header:hover { background: var(--paper); }
  .q-number {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700; color: var(--amber-deep);
    background: var(--amber-light); flex-shrink: 0;
  }
  .q-text { flex: 1; font-size: 0.95rem; font-weight: 500; line-height: 1.5; color: var(--ink); }
  .q-toggle {
    padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
    border: 1px solid var(--border); background: #fff; color: var(--amber-deep);
    cursor: pointer; font-family: inherit; flex-shrink: 0; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .q-toggle:hover { background: var(--amber); color: #fff; border-color: var(--amber); }
  .q-toggle svg { width: 14px; height: 14px; transition: transform 0.3s; }
  .q-card.expanded .q-toggle svg { transform: rotate(180deg); }

  .q-answer {
    max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.4s ease;
  }
  .q-card.expanded .q-answer { max-height: 600px; }
  .q-answer-inner {
    padding: 0 24px 20px; margin: 0 24px;
    border-top: 1px solid var(--border);
    font-size: 0.9rem; line-height: 1.8; color: #374151;
  }
  .q-card.expanded .q-answer-inner { padding-top: 16px; }

  /* ── Score Bar ── */
  .score-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; background: var(--amber-light); border-radius: 12px;
    margin-bottom: 28px; font-size: 0.88rem; color: var(--amber-deep); font-weight: 600;
  }
  .score-bar .count { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .topbar { padding: 0 16px; }
    .logo { font-size: 1.3rem; margin-right: 24px; }
    .top-nav a { padding: 6px 12px; font-size: 0.78rem; }
    .main { padding: calc(var(--topbar-h) + 32px) 16px 60px; }
    .page-title { font-size: 1.4rem; }
    .input-row { flex-direction: column; }
    .input-card { padding: 20px; }
    .q-header { padding: 14px 18px; gap: 12px; }
    .q-number { width: 32px; height: 32px; font-size: 0.78rem; }
    .q-text { font-size: 0.88rem; }
  }

  /* ── Fade In Animation ── */
  .q-card {
    animation: fadeInUp 0.4s ease backwards;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header class="topbar">
  <a href="#" class="logo">Pap<em>ier</em></a>
  <ul class="top-nav">
    <li><a href="#">文档库</a></li>
    <li><a href="#">AI 助手</a></li>
    <li><a href="#">最近</a></li>
    <li><a href="#" class="active">每日训练</a></li>
  </ul>
</header>

<main class="main">
  <h1 class="page-title">每日训练</h1>
  <p class="page-subtitle">AI 根据文档库内容出题，每日精进你的技术能力</p>

  <!-- Input -->
  <div class="input-card">
    <div class="preset-chips">
      <button class="chip active" onclick="selectPreset(this, 'Vue')">Vue</button>
      <button class="chip" onclick="selectPreset(this, 'JavaScript')">JavaScript</button>
      <button class="chip" onclick="selectPreset(this, 'Node.js')">Node.js</button>
      <button class="chip" onclick="selectPreset(this, 'React')">React</button>
      <button class="chip" onclick="selectPreset(this, 'TypeScript')">TypeScript</button>
    </div>
    <div class="input-row">
      <input
        class="input-field"
        type="text"
        id="questionInput"
        value="给我出5道和Vue相关的面试题"
        placeholder="给我出5道和Vue相关的问题..."
        onkeydown="if(event.key==='Enter')generateQuestions()"
      >
      <button class="btn btn-primary" onclick="generateQuestions()" id="generateBtn">
        开始出题
      </button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-dots" id="loadingDots">
    <span></span><span></span><span></span>
  </div>

  <!-- Score Bar -->
  <div class="score-bar" id="scoreBar" style="display:none">
    <span>🎯 共 <span class="count" id="qCount">0</span> 道题目</span>
    <span>已答 <span id="answered">0</span> / <span id="totalQ">0</span></span>
  </div>

  <!-- Questions -->
  <div class="questions-list" id="questionsList"></div>
</main>

<script>
  // ── Mock data ──
  const mockQuestions = {
    Vue: [
      { q: "Vue 3 Composition API 相比 Options API 有哪些优势？什么场景下应该使用 Composition API？", a: "Composition API 的优势在于：<br><br>1. <strong>更好的逻辑复用</strong>：通过 composable 函数可以轻松提取和复用逻辑，告别 mixin 的命名冲突和不清晰的数据来源问题。<br><br>2. <strong>更灵活的代码组织</strong>：不再按选项类型（data/methods/computed）拆分，而是按功能关注点组织代码，大型组件可维护性显著提升。<br><br>3. <strong>更好的 TypeScript 支持</strong>：Composition API 从设计之初就考虑了类型推断，无需额外的类型装饰器。<br><br>4. <strong>更小的生产包体积</strong>：Tree-shaking 更友好，未使用的 API 可被摇掉。<br><br>适用场景：组件逻辑复杂（超过 100 行）、需要共享逻辑、使用 TypeScript 的项目推荐使用 Composition API；简单组件仍可用 Options API。" },
      { q: "Vue 3 的响应式系统是如何工作的？Proxy 和 Object.defineProperty 有什么区别？", a: "Vue 3 使用 ES6 Proxy 重构了响应式系统，核心机制：<br><br>1. <strong>reactive()</strong>：通过 Proxy 创建深层响应式代理，拦截 get/set/deleteProperty 等 13 种操作。<br><br>2. <strong>ref()</strong>：使用 getter/setter 对 .value 实现响应式，内部值为对象时调用 reactive。<br><br>3. <strong>依赖收集（track）</strong>：get 拦截时将当前 effect 收集到 targetMap → depsMap → deps 的三层结构中。<br><br>4. <strong>派发更新（trigger）</strong>：set 拦截时通知所有收集的 effect 重新执行。<br><br>与 Vue 2 的 Object.defineProperty 对比：<br>• Proxy 可拦截新增/删除属性，Vue 2 需要 $set/$delete<br>• Proxy 直接代理整个对象，性能更好<br>• Proxy 可拦截数组索引和 length 修改<br>• Proxy 不支持 IE 11（Vue 2 支持）" },
      { q: "Vue Router 的导航守卫有哪些？讲一下完整的导航解析流程。", a: "导航守卫分为三类：<br><br><strong>全局守卫</strong>：<br>• beforeEach：导航触发前，常用于权限验证<br>• beforeResolve：组件内守卫和异步路由组件解析后<br>• afterEach：导航完成后，无 next 参数<br><br><strong>路由独享守卫</strong>：<br>• beforeEnter：路由配置中直接定义<br><br><strong>组件内守卫</strong>：<br>• beforeRouteEnter：进入组件前（无法访问 this）<br>• beforeRouteUpdate：路由参数变化时<br>• beforeRouteLeave：离开组件前（常用于表单未保存提示）<br><br>完整流程：导航触发 → beforeRouteLeave → beforeEach → beforeRouteUpdate → beforeEnter → 解析异步组件 → beforeRouteEnter → beforeResolve → afterEach → DOM 更新 → beforeRouteEnter 的 next 回调。" },
      { q: "Vue 3 中 v-model 和 v-model:xxx 有什么区别？如何自定义组件的 v-model？", a: "<strong>v-model 默认行为变化</strong>：<br><br>• Vue 2：v-model 绑定 value prop + input 事件<br>• Vue 3：v-model 绑定 modelValue prop + update:modelValue 事件<br><br><strong>多 v-model 绑定（v-model:xxx）</strong>：<br>Vue 3 支持在同一个组件上使用多个 v-model：<br><code>&lt;UserForm v-model:name=\"name\" v-model:email=\"email\" /&gt;</code><br><br>组件内通过 props 接收（name, email），通过 emit('update:name', value) 更新。<br><br><strong>自定义 v-model 修饰符</strong>：<br>通过 prop modelModifiers 接收修饰符（如 .capitalize），在组件内实现自定义转换逻辑。<br><br>与 Vue 2 对比：Vue 2 只能绑定一个 v-model（.sync 修饰符补充），Vue 3 原生支持多个 v-model，更加灵活清晰。" },
      { q: "Vue 3 的 Teleport 和 Suspense 组件分别解决什么问题？如何使用？", a: "<strong>Teleport（传送门）</strong>：<br><br>解决 DOM 渲染位置与组件逻辑解耦的问题。典型场景：模态框、通知栏、下拉菜单等需要渲染到 body 层级的组件。<br><br>用法：<br><code>&lt;Teleport to=\"body\"&gt;</code><br><code>  &lt;Modal /&gt;</code><br><code>&lt;/Teleport&gt;</code><br><br>to 可以是 CSS 选择器或 DOM 元素，disabled 属性可动态关闭。<br><br><strong>Suspense（异步组件协调）</strong>：<br><br>协调异步依赖的加载状态。适用于异步组件、异步数据请求等场景。<br><br>用法：通过 default 和 fallback 两个插槽，展示加载中和加载完成的 UI。支持嵌套 Suspense 边界。<br><br>注意：Suspense 仍处于实验性阶段，API 可能调整。与 React Suspense 类似但实现不同。" }
    ],
    JavaScript: [
      { q: "JavaScript 中闭包是什么？请举例说明闭包的实际应用场景。", a: "<strong>闭包（Closure）</strong>：函数能够访问其外部函数作用域中变量的能力，即使外部函数已经执行完毕。<br><br>原理：JS 引擎在函数创建时保存对其词法作用域的引用，内层函数持有外层函数作用域的引用，阻止垃圾回收。<br><br>应用场景：<br>1. <strong>数据私有化</strong>：创建私有变量，通过暴露的接口修改<br>2. <strong>函数工厂</strong>：柯里化和偏函数<br>3. <strong>模块模式</strong>：IIFE 模拟块级作用域<br>4. <strong>防抖/节流</strong>：利用闭包保存 timer 变量<br>5. <strong>React Hooks</strong>：useState 底层依赖闭包保存 state" },
    ]
  };

  let currentPreset = 'Vue';
  let answeredSet = new Set();

  function selectPreset(btn, preset) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    currentPreset = preset;
    document.getElementById('questionInput').value = `给我出5道和${preset}相关的面试题`;
  }

  function generateQuestions() {
    const input = document.getElementById('questionInput');
    const btn = document.getElementById('generateBtn');
    const loading = document.getElementById('loadingDots');
    const list = document.getElementById('questionsList');
    const scoreBar = document.getElementById('scoreBar');

    // Reset
    answeredSet.clear();
    list.innerHTML = '';
    scoreBar.style.display = 'none';

    // Loading state
    btn.disabled = true;
    btn.textContent = '出题中...';
    loading.classList.add('visible');

    // Simulate API delay
    setTimeout(() => {
      const data = mockQuestions[currentPreset] || mockQuestions['Vue'];
      const count = Math.min(5, data.length);

      list.innerHTML = data.slice(0, count).map((item, i) => `
        <div class="q-card" id="card${i}" style="animation-delay:${i * 0.08}s">
          <div class="q-header" onclick="toggleCard(${i})">
            <div class="q-number">${String(i + 1).padStart(2, '0')}</div>
            <div class="q-text">${item.q}</div>
            <button class="q-toggle" onclick="event.stopPropagation(); toggleCard(${i})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <polyline points="6 9 12 15 18 9" />
              </svg>
              显示答案
            </button>
          </div>
          <div class="q-answer">
            <div class="q-answer-inner">${item.a}</div>
          </div>
        </div>
      `).join('');

      document.getElementById('qCount').textContent = count;
      document.getElementById('totalQ').textContent = count;
      document.getElementById('answered').textContent = '0';
      scoreBar.style.display = 'flex';

      btn.disabled = false;
      btn.textContent = '开始出题';
      loading.classList.remove('visible');
    }, 1500);
  }

  function toggleCard(idx) {
    const card = document.getElementById('card' + idx);
    card.classList.toggle('expanded');

    const toggleBtn = card.querySelector('.q-toggle');
    const isExpanded = card.classList.contains('expanded');

    if (isExpanded) {
      toggleBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9" /></svg> 收起答案`;
      answeredSet.add(idx);
    } else {
      toggleBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9" /></svg> 显示答案`;
      answeredSet.delete(idx);
    }

    document.getElementById('answered').textContent = answeredSet.size;
  }

  // Initialize with demo data on load
  window.addEventListener('DOMContentLoaded', () => generateQuestions());
</script>
</body>
</html>
