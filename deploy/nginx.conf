# Papier 项目 Nginx 配置
# 放置路径：/etc/nginx/sites-available/papier  → 软链到 sites-enabled

server {
    listen 80;
    server_name your-domain.com;   # 替换为你的域名或服务器IP

    # 上传文件大小限制
    client_max_body_size 200M;

    # 前端静态文件
    root /var/www/papier/dist;
    index index.html;

    # 上传文件（图片、PDF等）
    location /uploads/ {
        alias /var/www/papier/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理到 Node.js 后端
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式输出需要关闭缓冲
        location /api/chat/ask/stream {
            proxy_pass http://127.0.0.1:3000;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/training/generate/stream {
            proxy_pass http://127.0.0.1:3000;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # SPA 路由回退：非文件请求都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
